<svg xmlns="http://www.w3.org/2000/svg" width="180" height="250" viewBox="0 0 180 250">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="180" height="250" rx="6" ry="6" fill="url(#bg)"/>
  <!-- Spine line -->
  <rect x="0" y="0" width="12" height="250" rx="3" ry="3" fill="rgba(0,0,0,0.2)"/>
  <!-- Book icon (open book) -->
  <g transform="translate(90,100)" fill="white" opacity="0.9">
    <path d="M-38,-25 C-38,-25 -38,30 -38,30 C-20,22 0,22 0,30 C0,30 0,-25 0,-25 C-15,-33 -38,-25 -38,-25 Z"/>
    <path d="M38,-25 C38,-25 38,30 38,30 C20,22 0,22 0,30 C0,30 0,-25 0,-25 C15,-33 38,-25 38,-25 Z"/>
    <rect x="-1.5" y="-25" width="3" height="55" fill="rgba(0,0,0,0.3)"/>
  </g>
  <!-- "No Cover" text -->
  <text x="90" y="170" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600"
        fill="white" opacity="0.85" text-anchor="middle">No Cover</text>
  <text x="90" y="188" font-family="Segoe UI, Arial, sans-serif" font-size="11"
        fill="white" opacity="0.6" text-anchor="middle">Image Available</text>
</svg>
